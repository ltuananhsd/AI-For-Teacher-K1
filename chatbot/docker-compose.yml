services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # No ports exposed — only accessible within Docker network
    # Frontend nginx proxies /api → http://backend:8888
    expose:
      - "${BACKEND_PORT:-8888}"
    environment:
      - PORT=${BACKEND_PORT:-8888}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - CHAT_DB_FILE=/app/data/chat.db
    volumes:
      - backend-data:/app/data
      - ./faiss_index:/app/faiss_index
      - ./prompts:/app/prompts:ro
      - ./tailieuduan:/app/tailieuduan:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-7777}:80"
    environment:
      - BACKEND_HOST=backend
      - BACKEND_PORT=${BACKEND_PORT:-8888}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
