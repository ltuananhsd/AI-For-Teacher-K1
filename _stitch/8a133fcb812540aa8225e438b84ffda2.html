<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - GOOGLE AI ECOSYSTEM BOOTCAMP 2026</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4387f4",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0a0c10",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .grid-pattern {
            background-image: linear-gradient(rgba(67, 135, 244, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(67, 135, 244, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glow-blue {
            filter: blur(120px);
            background: radial-gradient(circle, rgba(67, 135, 244, 0.15) 0%, transparent 70%);
        }
        .glow-red {
            filter: blur(120px);
            background: radial-gradient(circle, rgba(234, 67, 53, 0.1) 0%, transparent 70%);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-x-hidden">
<!-- Background Elements -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute inset-0 grid-pattern"></div>
<div class="absolute -top-40 -left-40 size-[600px] glow-blue"></div>
<div class="absolute -bottom-40 -right-40 size-[600px] glow-red"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 size-[800px] opacity-20 bg-[radial-gradient(circle,_var(--tw-gradient-stops))] from-primary/20 via-transparent to-transparent"></div>
</div>
<div class="relative z-10 flex flex-col min-h-screen">
<!-- Top Navigation -->
<header class="flex items-center justify-between px-6 lg:px-12 py-6">
<div class="flex items-center gap-3">
<div class="text-primary size-8">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-100 text-lg font-bold tracking-tight uppercase">AI Ecosystem Bootcamp</h2>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-slate-400 hover:text-primary transition-colors text-sm font-medium" href="#">Trang chủ</a>
<a class="text-slate-400 hover:text-primary transition-colors text-sm font-medium" href="#">Thông tin</a>
<a class="text-slate-400 hover:text-primary transition-colors text-sm font-medium" href="#">Liên hệ</a>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-6">
<div class="glass-panel w-full max-w-[520px] rounded-xl p-8 lg:p-12 shadow-2xl relative overflow-hidden">
<!-- Decorative element -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 blur-3xl -mr-16 -mt-16 rounded-full"></div>
<div class="relative z-10">
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center size-16 rounded-full bg-primary/10 text-primary mb-6 ring-1 ring-primary/20">
<span class="material-symbols-outlined !text-3xl">lock_open</span>
</div>
<h1 class="text-slate-100 text-3xl font-bold tracking-tight mb-2">Đăng nhập hệ thống</h1>
<p class="text-slate-400 text-base">Chào mừng các chuyên gia AI tương lai</p>
</div>
<form class="space-y-5">
<div class="space-y-2">
<label class="text-slate-300 text-sm font-medium px-1">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 !text-xl">mail</span>
<input class="w-full bg-slate-900/50 border border-slate-700/50 rounded-lg py-4 pl-12 pr-4 text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-600" placeholder="Nhập email của bạn" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="text-slate-300 text-sm font-medium px-1">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 !text-xl">key</span>
<input class="w-full bg-slate-900/50 border border-slate-700/50 rounded-lg py-4 pl-12 pr-12 text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-600" placeholder="Nhập mật khẩu" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors" type="button">
<span class="material-symbols-outlined !text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="size-4 rounded border-slate-700 bg-slate-900/50 text-primary focus:ring-primary/20" type="checkbox"/>
<span class="text-sm text-slate-400 group-hover:text-slate-300 transition-colors">Ghi nhớ đăng nhập</span>
</label>
<a class="text-sm text-primary hover:underline font-medium" href="#">Quên mật khẩu?</a>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/25 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                            Đăng nhập
                            <span class="material-symbols-outlined !text-lg">arrow_forward</span>
</button>
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-slate-700/50"></div>
<span class="flex-shrink mx-4 text-slate-500 text-xs font-medium uppercase tracking-widest">Hoặc tiếp tục với</span>
<div class="flex-grow border-t border-slate-700/50"></div>
</div>
<button class="w-full glass-panel hover:bg-white/5 border border-slate-700/50 text-slate-100 font-medium py-3.5 rounded-lg transition-all flex items-center justify-center gap-3" type="button">
<svg class="size-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                            Tiếp tục với Google
                        </button>
</form>
<div class="mt-8 text-center">
<p class="text-slate-400 text-sm">
                            Chưa có tài khoản? 
                            <a class="text-primary hover:underline font-bold ml-1" href="#">Đăng ký tham gia ngay</a>
</p>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="p-8 text-center">
<p class="text-slate-500 text-xs font-medium tracking-widest uppercase">
                © 2026 Google AI Ecosystem. All Rights Reserved.
            </p>
</footer>
</div>
</body></html>
