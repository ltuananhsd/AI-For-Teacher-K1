services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=chatbot
      - POSTGRES_USER=chatbot
      - POSTGRES_PASSWORD=${DB_PASSWORD:-chatbot123}
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8888} --reload
    ports:
      - "${BACKEND_PORT:-8888}:${BACKEND_PORT:-8888}"
    environment:
      - PORT=${BACKEND_PORT:-8888}
      - DATABASE_URL=postgresql://chatbot:${DB_PASSWORD:-chatbot123}@db:5432/chatbot
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - FERNET_KEY=${FERNET_KEY}
      - FB_VERIFY_TOKEN=${FB_VERIFY_TOKEN}
    volumes:
      - .:/app
      - ./faiss_index:/app/faiss_index
      - ./prompts:/app/prompts
      - ./tailieuduan:/app/tailieuduan
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8888}
      - VITE_API_URL=http://backend:${BACKEND_PORT:-8888}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data-dev:
  frontend_node_modules:
