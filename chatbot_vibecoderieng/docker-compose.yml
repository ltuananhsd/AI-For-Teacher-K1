services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=chatbot
      - POSTGRES_USER=chatbot
      - POSTGRES_PASSWORD=${DB_PASSWORD:-chatbot123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # No ports exposed — only accessible within Docker network
    # Frontend nginx proxies /api → http://backend:8888
    expose:
      - "${BACKEND_PORT:-8888}"
    environment:
      - PORT=${BACKEND_PORT:-8888}
      - DATABASE_URL=postgresql://chatbot:${DB_PASSWORD:-chatbot123}@db:5432/chatbot
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - FERNET_KEY=${FERNET_KEY}
      - FB_VERIFY_TOKEN=${FB_VERIFY_TOKEN}
    volumes:
      - ./faiss_index:/app/faiss_index
      - ./prompts:/app/prompts:ro
      - ./tailieuduan:/app/tailieuduan:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-7777}:80"
    environment:
      - BACKEND_HOST=backend
      - BACKEND_PORT=${BACKEND_PORT:-8888}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
